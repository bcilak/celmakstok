{% extends "base.html" %}

{% block title %}BOM Güncelle - ÇELMAK{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <h1 class="h3 fw-bold mb-1">
                <i class="bi bi-arrow-repeat text-success me-2"></i>BOM Excel Güncelleme
            </h1>
            <p class="text-muted mb-0">
                #{{ bom_id }} - {{ root_name }} için yeni Excel yükleyin. Eski reçete silinmez, onayda yeni revizyon açılır.
            </p>
        </div>
        <a href="{{ url_for('production.bom_list') }}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> BOM Listesi
        </a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <form action="{{ url_for('production.bom_update_excel', bom_id=bom_id) }}" method="POST" enctype="multipart/form-data">
                <div class="row g-3 align-items-end">
                    <div class="col-lg-5">
                        <label class="form-label fw-semibold">Yeni Excel Dosyası</label>
                        <input type="file" name="file" class="form-control" accept=".xlsx,.xls" required>
                    </div>
                    <div class="col-lg-4">
                        <label class="form-label fw-semibold">Ana Ürün Adı</label>
                        <input type="text" name="bom_name" class="form-control" value="{{ root_name }}">
                    </div>
                    <div class="col-lg-3">
                        <label class="form-label fw-semibold">Üretim Hattı</label>
                        <select name="category_id" class="form-select">
                            <option value="">-- Hat Seçilmedi --</option>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}" {% if selected_category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-search"></i> Farkları Analiz Et
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
