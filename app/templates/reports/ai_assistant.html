{% extends "base.html" %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
    :root {
        --chat-accent: #4f46e5;
        --chat-accent-grad: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
        --user-msg-bg: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        --shadow-soft: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
        --shadow-glow: 0 0 20px rgba(79, 70, 229, 0.3);
    }

    body {
        background: radial-gradient(circle at 10% 20%, rgb(239, 246, 255) 0%, rgb(219, 228, 255) 90%) !important;
        min-height: 100vh;
    }

    .chat-container {
        height: 85vh;
        max-width: 900px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.6);
        box-shadow: var(--shadow-soft);
        overflow: hidden;
    }

    .chat-header {
        padding: 1.2rem 1.5rem;
        background: rgba(255, 255, 255, 0.9);
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 10;
    }

    .bot-status {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .bot-icon-box {
        width: 48px;
        height: 48px;
        background: var(--chat-accent-grad);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 1.5rem;
        box-shadow: var(--shadow-glow);
    }

    .status-dot {
        width: 8px;
        height: 8px;
        background: #22c55e;
        border-radius: 50%;
        display: inline-block;
        margin-right: 5px;
        box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0% {
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
        }

        70% {
            box-shadow: 0 0 0 6px rgba(34, 197, 94, 0);
        }

        100% {
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
        }
    }

    .chat-body {
        flex: 1;
        overflow-y: auto;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        background: rgba(255, 255, 255, 0.4);
    }

    .chat-body::-webkit-scrollbar {
        width: 6px;
    }

    .chat-body::-webkit-scrollbar-track {
        background: transparent;
    }

    .chat-body::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
    }

    .message-wrapper {
        display: flex;
        align-items: flex-end;
        gap: 12px;
        opacity: 0;
        animation: slideUp 0.4s ease forwards;
    }

    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(15px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .message-wrapper.user {
        flex-direction: row-reverse;
    }

    .avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.9rem;
        flex-shrink: 0;
    }

    .avatar.ai {
        background: #e0e7ff;
        color: var(--chat-accent);
    }

    .avatar.user {
        background: #e2e8f0;
        color: #475569;
    }

    .bubble {
        max-width: 75%;
        padding: 1rem 1.2rem;
        border-radius: 18px;
        font-size: 0.98rem;
        line-height: 1.6;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.03);
    }

    .message-wrapper.ai .bubble {
        background: #fff;
        color: #1e293b;
        border-bottom-left-radius: 4px;
        border: 1px solid rgba(226, 232, 240, 0.8);
        overflow-wrap: break-word;
        overflow-x: auto;
        max-width: 85%;
    }

    /* Markdown rendered content */
    .message-wrapper.ai .bubble p {
        margin: 0 0 8px 0;
    }

    .message-wrapper.ai .bubble p:last-child {
        margin-bottom: 0;
    }

    .message-wrapper.ai .bubble h1,
    .message-wrapper.ai .bubble h2,
    .message-wrapper.ai .bubble h3 {
        margin: 12px 0 6px 0;
        font-size: 1.05em;
        color: #334155;
        border-bottom: 1px solid #e2e8f0;
        padding-bottom: 4px;
    }

    .message-wrapper.ai .bubble h3 {
        font-size: 0.98em;
        border-bottom: none;
    }

    .message-wrapper.ai .bubble ul,
    .message-wrapper.ai .bubble ol {
        margin: 4px 0 8px 0;
        padding-left: 20px;
    }

    .message-wrapper.ai .bubble li {
        margin-bottom: 3px;
    }

    .message-wrapper.ai .bubble strong {
        color: #1e293b;
    }

    .message-wrapper.ai .bubble hr {
        border: none;
        border-top: 1px solid #e2e8f0;
        margin: 10px 0;
    }

    .message-wrapper.ai .bubble code {
        background: #f1f5f9;
        padding: 1px 5px;
        border-radius: 4px;
        font-size: 0.88em;
        color: #475569;
    }

    /* Tables - only when AI uses them */
    .message-wrapper.ai .bubble table {
        width: 100%;
        font-size: 0.85em;
        margin: 8px 0;
        border-collapse: collapse;
        white-space: nowrap;
    }

    .message-wrapper.ai .bubble table th,
    .message-wrapper.ai .bubble table td {
        padding: 6px 10px;
        border: 1px solid #e2e8f0;
        text-align: left;
    }

    .message-wrapper.ai .bubble table th {
        background-color: #f1f5f9;
        font-weight: 600;
    }

    .message-wrapper.user .bubble {
        background: var(--user-msg-bg);
        color: #fff;
        border-bottom-right-radius: 4px;
        box-shadow: 0 4px 15px rgba(79, 70, 229, 0.25);
    }

    .typing-indicator {
        display: flex;
        align-items: center;
        gap: 5px;
        padding: 12px 18px;
    }

    .typing-indicator .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #94a3b8;
        animation: typingBounce 1.4s infinite ease-in-out;
    }

    .typing-indicator .dot:nth-child(1) {
        animation-delay: 0s;
    }

    .typing-indicator .dot:nth-child(2) {
        animation-delay: 0.2s;
    }

    .typing-indicator .dot:nth-child(3) {
        animation-delay: 0.4s;
    }

    @keyframes typingBounce {

        0%,
        80%,
        100% {
            transform: scale(0.6);
            opacity: 0.4;
        }

        40% {
            transform: scale(1);
            opacity: 1;
        }
    }

    .chat-footer {
        padding: 1.5rem;
        background: rgba(255, 255, 255, 0.95);
        border-top: 1px solid rgba(0, 0, 0, 0.05);
    }

    .chips-area {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        overflow-x: auto;
        padding-bottom: 5px;
    }

    .chips-area::-webkit-scrollbar {
        display: none;
    }

    .chip-btn {
        background: #fff;
        border: 1px solid #e2e8f0;
        color: #64748b;
        padding: 6px 14px;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .chip-btn:hover {
        background: #f1f5f9;
        color: var(--chat-accent);
        border-color: var(--chat-accent);
        transform: translateY(-2px);
    }

    .chip-btn.disabled {
        pointer-events: none;
        opacity: 0.5;
    }

    .input-wrapper {
        background: #f8fafc;
        border: 2px solid transparent;
        border-radius: 20px;
        padding: 6px;
        display: flex;
        align-items: center;
        transition: all 0.3s;
        box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.03);
    }

    .input-wrapper:focus-within {
        background: #fff;
        border-color: var(--chat-accent);
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    .chat-input {
        border: none;
        background: transparent;
        padding: 10px 15px;
        flex: 1;
        outline: none;
        max-height: 120px;
        resize: none;
        color: #334155;
    }

    .send-btn-modern {
        width: 42px;
        height: 42px;
        background: var(--chat-accent-grad);
        border: none;
        border-radius: 50%;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 0.2s;
        box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }

    .send-btn-modern:hover {
        transform: scale(1.1) rotate(-10deg);
    }

    .send-btn-modern:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
    }
</style>

<div class="container-fluid d-flex align-items-center justify-content-center py-4">
    <div class="chat-container col-12 col-xl-9">
        <div class="chat-header">
            <div class="bot-status">
                <div class="bot-icon-box"><i class="bi bi-robot"></i></div>
                <div>
                    <h5 class="fw-bold mb-0 text-dark">Rapor Asistanı</h5>
                    <small class="text-muted" style="font-size: 0.8rem;" id="statusText">
                        <span class="status-dot"></span>Online • Yapay Zeka
                    </small>
                </div>
            </div>
            <button class="btn btn-light btn-sm rounded-circle border" id="clearBtn" title="Sohbeti Temizle">
                <i class="bi bi-trash3 text-muted"></i>
            </button>
        </div>

        <div class="chat-body" id="chatBody">
            <div class="text-center my-auto p-4" id="welcomeScreen">
                <div class="mb-3"><i class="bi bi-chat-square-quote text-primary opacity-25"
                        style="font-size: 4rem;"></i></div>
                <h4 class="fw-bold text-dark">Merhaba! 👋</h4>
                <p class="text-muted">Veritabanı ile ilgili raporları saniyeler içinde hazırlayabilirim.</p>
            </div>
        </div>

        <div class="chat-footer">
            <div class="chips-area" id="chipsArea">
                <div class="chip-btn" data-query="Stokta biten ürünler neler?"><i
                        class="bi bi-lightning-fill text-warning"></i> Stoksuz Ürünler</div>
                <div class="chip-btn" data-query="Kritik seviyedeki malzemeler"><i
                        class="bi bi-exclamation-circle text-danger"></i> Kritik Stok</div>
                <div class="chip-btn" data-query="Üretim durumu nedir?"><i
                        class="bi bi-gear-wide-connected text-primary"></i> Üretim Hattı</div>
                <div class="chip-btn" data-query="Toplam stok değeri ne kadar?"><i
                        class="bi bi-currency-dollar text-info"></i> Stok Değeri</div>
            </div>
            <div class="input-wrapper">
                <textarea class="chat-input" id="queryInput" rows="1"
                    placeholder="Merak ettiğiniz raporu sorun..."></textarea>
                <button class="send-btn-modern" id="sendBtn">
                    <i class="bi bi-send-fill fs-6" id="sendIcon"></i>
                    <span class="spinner-border spinner-border-sm d-none" id="sendSpinner"></span>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        try {
            var chatBody = document.getElementById('chatBody');
            var queryInput = document.getElementById('queryInput');
            var sendBtn = document.getElementById('sendBtn');
            var sendIcon = document.getElementById('sendIcon');
            var sendSpinner = document.getElementById('sendSpinner');
            var clearBtn = document.getElementById('clearBtn');
            var statusText = document.getElementById('statusText');
            var chipsArea = document.getElementById('chipsArea');
            var isProcessing = false;
            var chatHistory = [];
            var ASK_URL = '{{ url_for("reports.ai_assistant_ask") }}';
            var CLEAR_URL = '{{ url_for("reports.ai_assistant_clear") }}';

            console.log('AI Chat initialized. ASK_URL:', ASK_URL);

            // Marked.js setup (optional)
            try { if (typeof marked !== 'undefined') { marked.setOptions({ breaks: true, gfm: true }); } } catch (e) { console.warn('marked.js error:', e); }

            function scrollToBottom() {
                chatBody.scrollTop = chatBody.scrollHeight;
            }

            function escapeHtml(t) {
                var d = document.createElement('div');
                d.textContent = t;
                return d.innerHTML;
            }

            function renderMarkdown(text) {
                try {
                    if (typeof marked !== 'undefined') {
                        return marked.parse(text);
                    }
                } catch (e) { console.warn('Markdown parse error:', e); }
                return escapeHtml(text);
            }

            function addUserMessage(text) {
                var ws = document.getElementById('welcomeScreen');
                if (ws) ws.remove();
                var el = document.createElement('div');
                el.className = 'message-wrapper user';
                el.innerHTML = '<div class="bubble">' + escapeHtml(text) + '</div><div class="avatar user"><i class="bi bi-person-fill"></i></div>';
                chatBody.appendChild(el);
                scrollToBottom();
            }

            function showTypingIndicator() {
                var el = document.createElement('div');
                el.className = 'message-wrapper ai';
                el.id = 'typingIndicator';
                el.innerHTML = '<div class="avatar ai"><i class="bi bi-stars"></i></div><div class="bubble"><div class="typing-indicator"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
                chatBody.appendChild(el);
                scrollToBottom();
            }

            function removeTypingIndicator() {
                var el = document.getElementById('typingIndicator');
                if (el) el.remove();
            }

            function addAIMessage(text) {
                removeTypingIndicator();
                var wrapper = document.createElement('div');
                wrapper.className = 'message-wrapper ai';
                var bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.innerHTML = renderMarkdown(text);
                // Format tables
                var tables = bubble.querySelectorAll('table');
                for (var i = 0; i < tables.length; i++) {
                    tables[i].classList.add('table', 'table-sm', 'table-bordered', 'table-hover');
                }
                wrapper.innerHTML = '<div class="avatar ai"><i class="bi bi-stars"></i></div>';
                wrapper.appendChild(bubble);
                chatBody.appendChild(wrapper);
                scrollToBottom();
            }

            function setLoading(loading) {
                isProcessing = loading;
                sendBtn.disabled = loading;
                queryInput.disabled = loading;
                if (loading) {
                    sendIcon.classList.add('d-none');
                    sendSpinner.classList.remove('d-none');
                } else {
                    sendIcon.classList.remove('d-none');
                    sendSpinner.classList.add('d-none');
                }
                var chips = chipsArea.querySelectorAll('.chip-btn');
                for (var i = 0; i < chips.length; i++) {
                    if (loading) chips[i].classList.add('disabled');
                    else chips[i].classList.remove('disabled');
                }
                statusText.innerHTML = loading
                    ? '<span class="status-dot" style="background:#f59e0b;box-shadow:0 0 0 3px rgba(245,158,11,0.2);animation:pulse 1s infinite"></span>Düşünüyor...'
                    : '<span class="status-dot"></span>Online • Yapay Zeka';
            }

            function sendMessage(text) {
                if (!text || !text.trim() || isProcessing) return;
                console.log('Sending message:', text.substring(0, 50));

                addUserMessage(text);
                chatHistory.push({ role: 'user', content: text });
                queryInput.value = '';
                setLoading(true);
                showTypingIndicator();

                var xhr = new XMLHttpRequest();
                xhr.open('POST', ASK_URL, true);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.withCredentials = true;
                xhr.timeout = 120000; // 2 dakika timeout

                xhr.onload = function () {
                    console.log('Response status:', xhr.status);
                    try {
                        var data = JSON.parse(xhr.responseText);
                        if (data.success) {
                            addAIMessage(data.answer);
                            chatHistory.push({ role: 'ai', content: data.answer });
                        } else {
                            addAIMessage(data.error || 'Bir hata oluştu.');
                        }
                    } catch (e) {
                        console.error('Parse error:', e);
                        addAIMessage('Sunucu yanıtı okunamadı (Kod: ' + xhr.status + ')');
                    }
                    setLoading(false);
                    queryInput.focus();
                };

                xhr.onerror = function () {
                    console.error('XHR error');
                    removeTypingIndicator();
                    addAIMessage('Bağlantı hatası oluştu. Sayfayı yenileyip tekrar deneyin.');
                    setLoading(false);
                };

                xhr.ontimeout = function () {
                    console.error('XHR timeout');
                    removeTypingIndicator();
                    addAIMessage('İstek zaman aşımına uğradı. Tekrar deneyin.');
                    setLoading(false);
                };

                xhr.send(JSON.stringify({ query: text, history: chatHistory.slice(-6) }));
            }

            // Enter tuşu
            queryInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage(queryInput.value);
                }
            });

            // Gönder butonu
            sendBtn.addEventListener('click', function () {
                sendMessage(queryInput.value);
            });

            // Chip tıklama
            var chips = chipsArea.querySelectorAll('.chip-btn');
            for (var i = 0; i < chips.length; i++) {
                chips[i].addEventListener('click', function () {
                    sendMessage(this.getAttribute('data-query'));
                });
            }

            // Temizle
            clearBtn.addEventListener('click', function () {
                chatHistory = [];
                chatBody.innerHTML = '<div class="text-center my-auto p-4" id="welcomeScreen"><div class="mb-3"><i class="bi bi-chat-square-quote text-primary opacity-25" style="font-size: 4rem;"></i></div><h4 class="fw-bold text-dark">Merhaba! 👋</h4><p class="text-muted">Veritabanı ile ilgili raporları saniyeler içinde hazırlayabilirim.</p></div>';
                var xhrClear = new XMLHttpRequest();
                xhrClear.open('POST', CLEAR_URL, true);
                xhrClear.withCredentials = true;
                xhrClear.send();
            });

            console.log('AI Chat ready!');
        } catch (e) {
            console.error('AI Chat init error:', e);
        }
    });
</script>
{% endblock %}
